<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nallo AI</title>
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg" />
  <link rel="stylesheet" href="css/style.v2.css">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- Auth Screen -->
  <div id="auth-screen" class="screen active">
    <div class="auth-container">
      <div class="auth-logo">
        <div class="logo-icon">
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="20" cy="20" r="20" fill="url(#logoGrad)"/>
            <path d="M12 28L20 12L28 28" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M14.5 23H25.5" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
            <defs>
              <linearGradient id="logoGrad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
                <stop stop-color="#00D4FF"/>
                <stop offset="1" stop-color="#0066FF"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1>Nallo AI</h1>
        <p class="auth-tagline">Your intelligent AI assistant</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Sign In</button>
        <button class="auth-tab" data-tab="signup">Sign Up</button>
      </div>

      <div id="login-form" class="auth-form active">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••" />
        </div>
        <button class="btn-primary" id="login-btn">Sign In</button>
        <div class="auth-divider"><span>or</span></div>
        <button class="btn-guest" id="guest-btn">Continue as Guest</button>
        <p id="login-error" class="auth-error"></p>
      </div>

      <div id="signup-form" class="auth-form">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="signup-name" placeholder="Your name" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signup-email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signup-password" placeholder="Min 6 characters" />
        </div>
        <button class="btn-primary" id="signup-btn">Create Account</button>
        <p id="signup-error" class="auth-error"></p>
        <p id="signup-success" class="auth-success"></p>
      </div>
    </div>
  </div>

  <!-- Main App Screen -->
  <div id="app-screen" class="screen">
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" width="28" height="28">
            <circle cx="16" cy="16" r="16" fill="url(#sideLogoGrad)"/>
            <path d="M9 22L16 10L23 22" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M11 19H21" stroke="white" stroke-width="2" stroke-linecap="round"/>
            <defs>
              <linearGradient id="sideLogoGrad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
                <stop stop-color="#00D4FF"/>
                <stop offset="1" stop-color="#0066FF"/>
              </linearGradient>
            </defs>
          </svg>
          <span>Nallo AI</span>
        </div>
        <button id="sidebar-close" class="icon-btn sidebar-close-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>

      <button class="new-chat-btn" id="new-chat-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        New Chat
      </button>

      <div class="sidebar-section-title">Recent Chats</div>
      <div id="chat-history-list" class="chat-history-list">
        <div class="history-empty">No chats yet. Start a conversation!</div>
      </div>

      <div class="sidebar-footer">
        <div class="user-info" id="user-info">
          <div class="user-avatar" id="user-avatar">G</div>
          <div class="user-details">
            <span class="user-name" id="user-name-display">Guest</span>
            <span class="user-email" id="user-email-display">guest mode</span>
          </div>
        </div>
        <button class="icon-btn logout-btn" id="logout-btn" title="Sign out">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        </button>
      </div>
    </aside>

    <!-- Overlay for mobile -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- Main Chat Area -->
    <main class="main-content">
      <!-- Top Bar -->
      <header class="topbar">
        <button class="icon-btn menu-btn" id="menu-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        </button>
        <div class="topbar-center">
          <span class="topbar-title">Nallo AI</span>
        </div>
        <div class="model-indicator" id="model-indicator">
          <span class="model-dot"></span>
          <span id="current-model-name">GPT-4o Mini</span>
        </div>
      </header>

      <!-- Model Selector -->
      <div class="model-selector-bar">
        <div class="model-selector-label">AI MODEL</div>
        <div class="model-buttons">
          <button class="model-btn active" data-model="gpt4o-mini" data-label="GPT-4o Mini">
            GPT-4o Mini <span class="model-tag">Fast</span>
          </button>
          <button class="model-btn" data-model="claude-haiku" data-label="Claude 3.5 Haiku">
            Claude 3.5 Haiku <span class="model-tag">Smart</span>
          </button>
          <button class="model-btn" data-model="gemini-flash" data-label="Gemini 2.0 Flash">
            Gemini 2.0 Flash <span class="model-tag">Creative</span>
          </button>
        </div>
      </div>

      <!-- Chat Messages -->
      <div class="chat-container" id="chat-container">
        <div class="welcome-screen" id="welcome-screen">
          <div class="welcome-logo">
            <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg" width="60" height="60">
              <circle cx="30" cy="30" r="30" fill="url(#welcomeGrad)"/>
              <path d="M18 42L30 18L42 42" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M21.5 35H38.5" stroke="white" stroke-width="3" stroke-linecap="round"/>
              <defs>
                <linearGradient id="welcomeGrad" x1="0" y1="0" x2="60" y2="60" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#00D4FF"/>
                  <stop offset="1" stop-color="#0066FF"/>
                </linearGradient>
              </defs>
            </svg>
          </div>
          <h2>How can I help you today?</h2>
          <p>Choose a model above and start chatting</p>
          <div class="suggestion-chips">
            <button class="chip" data-prompt="Explain quantum computing in simple terms">Explain quantum computing</button>
            <button class="chip" data-prompt="Write a short poem about the ocean">Write a poem</button>
            <button class="chip" data-prompt="Help me debug my Python code">Debug my code</button>
            <button class="chip" data-prompt="What are the best productivity tips?">Productivity tips</button>
          </div>
        </div>
        <div id="messages" class="messages"></div>
      </div>

      <!-- Input Area -->
      <div class="input-area">
        <div class="input-wrapper">
          <textarea
            id="chat-input"
            placeholder="Message Nallo AI..."
            rows="1"
            maxlength="4000"
          ></textarea>
          <button class="send-btn" id="send-btn" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2L15 22 11 13 2 9l20-7z"/></svg>
          </button>
        </div>
        <p class="input-disclaimer">Nallo AI can make mistakes. Verify important information.</p>
      </div>
    </main>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast hidden"></div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.8.0/lib/highlight.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.8.0/styles/atom-one-dark.min.css">
  <script src="js/config.v2.js"></script>
  <script src="js/supabase.v2.js"></script>
  <script src="js/ai.v2.js"></script>
  <script src="js/chat.v2.js"></script>
  <script src="js/app.v2.js"></script>
</body>
</html>
